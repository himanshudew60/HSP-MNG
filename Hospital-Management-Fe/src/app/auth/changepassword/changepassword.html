<h3 class="mb-2">🔐 Change Password</h3>
<p class="form-subtitle mb-4">
  Set a new password for your account
</p>

<form #changePassForm="ngForm" (ngSubmit)="onChangePassword()">
  <!-- New Password -->
  <div class="mb-3">
    <label class="form-label">New Password</label>
    <input
      type="password"
      name="newPassword"
      [(ngModel)]="ChangeData.password"
      class="form-control"
      placeholder="Enter new password"
      required
      minlength="6"
    />
  </div>

  <!-- Confirm Password -->
  <div class="mb-3">
    <label class="form-label">Confirm Password</label>
    <input
      type="password"
      name="confirmPassword"
      [(ngModel)]="ChangeData.confirmPassword"
      class="form-control"
      placeholder="Re-enter new password"
      required
      minlength="6"
    />
  </div>

  <!-- Submit button -->
  <button type="submit" class="btn btn-success w-100">
    Change Password
  </button>
</form>

<!-- Back to login -->
<p class="switch-text text-center mt-3">
  Back to 
  <a routerLink="/login" class="fw-bold">Login</a>
</p>
