<h3 class="mb-2">🔑 Forgot Password</h3>
<p class="form-subtitle mb-4">
  Enter your registered email to receive an OTP
</p>

<form>
  <!-- Email field -->
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input
      type="email"
      name="email"
      [(ngModel)]="ForgotData.email"
      class="form-control"
      placeholder="Enter your registered email"
      required
    />
  </div>

  <!-- OTP field -->
  <div class="mb-3">
    <div class="d-flex justify-content-between align-items-center">
      <label class="form-label mb-0">One Time Password</label>
      <!-- Timer display -->
      <small *ngIf="timer > 0" class="text-muted">⏱ {{ timer }}s</small>
    </div>
    <input
  type="text"
  name="otp"
  [(ngModel)]="ForgotData.otp"
  class="form-control mt-1"
  placeholder="Enter the 6-digit OTP"
  [disabled]="!otpEnabled"
  minlength="6"
  maxlength="6"
  pattern="[0-9]{6}"
  inputmode="numeric"
/>
  </div>

  <!-- Send/Resend OTP button -->
  <button
    type="button"
    class="btn btn-primary w-100 mb-2"
    (click)="sendOtp()"
    [disabled]="isButtonDisabled"
  >
    {{ otpButtonText }}
  </button>

  <!-- Reset button -->
  <button (click)="onReset()" type="submit" class="btn btn-success w-100">
    Verify & Reset Password
  </button>
</form>

<!-- Back to login -->
<p class="switch-text text-center mt-3">
  Remembered your password? 
  <a routerLink="/login" class="fw-bold">Login</a>
</p>
